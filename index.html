<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Informações - Madness</title>
<link rel="stylesheet" href="style.css">
<style>
body{background: linear-gradient(to bottom,#0a0a0a,#111); color: gold; font-family:"Friz Quadrata",Arial,sans-serif; margin:0;padding:0;}
.container{margin-top:70px; padding:20px; display:flex; flex-wrap:wrap; gap:20px;}
.card{background: linear-gradient(145deg,#f4e9d0,#e0c97a); border:2px solid gold; border-radius:10px; padding:20px; box-shadow:0 0 10px rgba(0,0,0,0.5); transition:0.3s; position:relative; width:300px;}
.card:hover{box-shadow:0 0 20px #ffd700;}
.card h3{color: gold;}
.tag{background:#111;color:gold;padding:3px 8px;border-radius:5px;margin-right:5px;font-size:0.8rem;}
.editBtn, .deleteBtn{position:absolute;top:10px;right:10px;display:none;}
.card:hover .editBtn, .card:hover .deleteBtn{display:inline-block;}
select,input{margin-bottom:10px; padding:5px; border-radius:5px; background:#111;color:gold; border:1px solid gold;}
</style>
</head>
<body>

<!-- Navbar -->
<div class="navbar">
  <div class="logo">MADNESS</div>
  <div class="links">
    <a href="index.html">Informações</a>
    <a href="progresso.html">Progresso</a>
    <a href="loot.html">Loot</a>
    <a href="admin.html">Admin</a>
    <a href="#" id="logoutBtn" style="display:none;">Logout</a>
  </div>
</div>

<div class="container">
  <!-- Filtros -->
  <select id="patchFilter">
    <option value="All">Todos Patches</option>
    <option value="9.2.7">9.2.7</option>
    <option value="10.0">10.0</option>
  </select>
  <select id="typeFilter">
    <option value="All">Todos Tipos</option>
    <option value="Update">Update</option>
    <option value="News">News</option>
    <option value="Event">Event</option>
  </select>

  <!-- Exemplo de Cards -->
  <div class="card" data-patch="10.0" data-type="Update">
    <h3>Nova Raid Lançada</h3>
    <p>Detalhes da raid...</p>
    <div class="tags">
      <span class="tag">Patch 10.0</span>
      <span class="tag">Update</span>
    </div>
    <button class="editBtn">Editar</button>
    <button class="deleteBtn">Excluir</button>
  </div>
</div>

<script>
const isAdmin = localStorage.getItem("admin")==="true";
if(isAdmin) document.getElementById("logoutBtn").style.display="inline-block";

const patchFilter = document.getElementById('patchFilter');
const typeFilter = document.getElementById('typeFilter');

function filterCards(){
  const cards = document.querySelectorAll('.card');
  const patch = patchFilter.value;
  const type = typeFilter.value;
  cards.forEach(card=>{
    const matchPatch = patch==="All" || card.dataset.patch===patch;
    const matchType = type==="All" || card.dataset.type===type;
    card.style.display = (matchPatch && matchType) ? 'block':'none';
  });
}
patchFilter.addEventListener('change', filterCards);
typeFilter.addEventListener('change', filterCards);

// Mostrar botões editar/excluir só para admin
if(isAdmin){
  document.querySelectorAll('.editBtn, .deleteBtn').forEach(btn=>btn.style.display='inline-block');
}
</script>
</body>
</html>
