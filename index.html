<div class="container">
  <div id="posts"></div>

  <div id="adminPostBox" class="card" style="display:none;">
    <h2>Criar Post (Admin)</h2>
    <input id="postTitle" placeholder="Título">
    <textarea id="postContent" placeholder="Conteúdo"></textarea>
    <input id="postImage" placeholder="URL da Imagem">
    <button id="createPostBtn">Publicar</button>
  </div>
</div>

<script type="module">
import { firebaseConfig } from "./config.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const isAdmin = localStorage.getItem("admin") === "true";
if(isAdmin) adminPostBox.style.display="block";

const snap = await getDocs(collection(db,"posts"));
snap.forEach(doc=>{
  const p = doc.data();
  posts.innerHTML += `
    <div class="card">
      <h2>${p.title}</h2>
      ${p.image ? `<img src="${p.image}" style="max-width:100%; border-radius:8px;">` : ''}
      <p>${p.content}</p>
      <small>${p.date}</small>
    </div>
  `;
});

createPostBtn.onclick=async()=>{
  await addDoc(collection(db,"posts"),{
    title: postTitle.value,
    content: postContent.value,
    image: postImage.value,
    date: new Date().toLocaleDateString()
  });
  alert("Post publicado!");
  location.reload();
}
</script>
