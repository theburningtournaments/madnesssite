<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Guild Madness - Info</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Guild Madness - Info</h1>
  <div id="loginForm">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button id="loginBtn">Login</button>
    <button id="logoutBtn">Logout</button>
  </div>
</header>

<section>
  <h2>Updates</h2>
  <div class="admin">
    <textarea id="updateText" placeholder="Nova update"></textarea>
    <button id="addUpdateBtn">Adicionar Update</button>
  </div>
  <div id="updatesList"></div>
</section>

<script type="module" src="firebase.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
