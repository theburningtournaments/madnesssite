<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Informações - Madness</title>
<link rel="stylesheet" href="style.css">
<style>
body{background:#0b0b0b;color:gold;font-family:Arial,sans-serif;margin:0;padding:0;}
.navbar{position:fixed;top:0;width:100%;background:#111;color:gold;padding:10px;display:flex;justify-content:space-between;align-items:center;z-index:1000;}
.navbar .links a{color:gold;margin-left:15px;text-decoration:none;font-weight:bold;}
.container{margin-top:70px;padding:20px;}
.card{background:#1c1c1c;padding:15px;margin-bottom:20px;border-radius:8px;border:1px solid gold;}
.card img{max-width:100%;border-radius:8px;margin-top:10px;}
input, textarea, button{padding:5px; margin:5px 0; border-radius:5px; border:1px solid gold; background:#111; color:gold;}
textarea{width:100%; height:60px;}
</style>
</head>
<body>

<div class="navbar">
  <div class="logo">MADNESS</div>
  <div class="links">
    <a href="index.html">Informações</a>
    <a href="progresso.html">Progresso</a>
    <a href="loot.html">Loot</a>
    <a href="admin.html">Admin</a>
  </div>
</div>

<div class="container">
  <div id="posts"></div>

  <!-- Admin post box -->
  <div id="adminPostBox" class="card" style="display:none;">
    <h2>Criar Post (Admin)</h2>
    <input id="postTitle" placeholder="Título"><br>
    <textarea id="postContent" placeholder="Conteúdo"></textarea><br>
    <input id="postImageURL" placeholder="URL da Imagem"><br>
    <button id="createPostBtn">Publicar</button>
  </div>
</div>

<script type="module">
import { firebaseConfig } from "./config.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, getDocs, setDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const isAdmin = localStorage.getItem("admin") === "true";
if(isAdmin) document.getElementById("adminPostBox").style.display="block";

const postsContainer = document.getElementById("posts");

// Função para carregar posts
async function loadPosts(){
  postsContainer.innerHTML = "";
  const snap = await getDocs(collection(db,"posts"));
  snap.forEach(docItem=>{
    const p = docItem.data();
    const div = document.createElement("div");
    div.classList.add("card");
    div.innerHTML = `
      <h2>${p.title}</h2>
      ${p.imageURL ? `<img src="${p.imageURL}">` : ''}
      <p>${p.content}</p>
      <small>${p.date}</small>
    `;
    postsContainer.appendChild(div);
  });
}

// Publicar post (Admin)
if(isAdmin){
  document.getElementById("createPostBtn").onclick = async () => {
    const title = document.getElementById("postTitle").value.trim();
    const content = document.getElementById("postContent").value.trim();
    const imageURL = document.getElementById("postImageURL").value.trim();
    if(!title || !content){ alert("Preencha título e conteúdo!"); return; }

    const id = title + "_" + Date.now();
    await setDoc(doc(db,"posts",id),{
      title: title,
      content: content,
      imageURL: imageURL,
      date: new Date().toLocaleDateString()
    });

    // Limpar campos
    document.getElementById("postTitle").value = "";
    document.getElementById("postContent").value = "";
    document.getElementById("postImageURL").value = "";

    // Atualizar posts sem recarregar
    loadPosts();
  };
}

// Carregar posts ao iniciar
loadPosts();
</script>
</body>
</html>
