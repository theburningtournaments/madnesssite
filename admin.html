<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Admin - Madness</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{
  background: linear-gradient(to bottom,#0a0a0a,#111);
  color: gold;
  font-family:"Friz Quadrata",Arial,sans-serif;
  margin:0;
  padding:0;
}
.navbar{
  position:fixed;
  top:0;
  width:100%;
  background:#111;
  color:gold;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:1000;
  border-bottom:3px solid gold;
}
.navbar .links a{
  color:gold;
  margin-left:15px;
  text-decoration:none;
  font-weight:bold;
  transition:0.3s;
}
.navbar .links a:hover{
  color:#ffd700;
  text-shadow:0 0 5px #ffd700;
}
.container{
  margin-top:70px;
  padding:20px;
  display:flex;
  flex-wrap:wrap;
  gap:20px;
}
.card{
  background: linear-gradient(145deg,#1b1b1b,#111);
  padding:20px;
  border-radius:10px;
  border:2px solid gold;
  box-shadow: 0 0 15px rgba(255,215,0,0.2);
  transition: 0.3s;
  width:300px;
}
.card:hover{
  transform: scale(1.03);
  box-shadow:0 0 20px #ffd700;
}
.card h3{margin-top:0;}
#charts{display:flex; flex-wrap:wrap; gap:20px; margin-top:20px;}
canvas{background:#111; border:1px solid gold; border-radius:10px;}
button{
  padding:5px 10px;
  border-radius:5px;
  background:#111;
  color:gold;
  border:1px solid gold;
  cursor:pointer;
  transition:0.3s;
}
button:hover{
  background:#222;
  box-shadow:0 0 8px #ffd700;
}
#loginForm{
  max-width:400px;
  margin:100px auto;
  background:#111;
  padding:20px;
  border:2px solid gold;
  border-radius:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
#loginForm input{
  padding:5px;
  border-radius:5px;
  background:#222;
  color:gold;
  border:1px solid gold;
}
#lootTable{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}
#lootTable th, #lootTable td{
  padding:8px;
  text-align:left;
  border-bottom:1px solid gold;
}
#lootTable th{background:#222;}
tr:nth-child(even){background:#1c1c1c;}
tr:nth-child(odd){background:#111;}
</style>
</head>
<body>

<div class="navbar">
  <div class="logo">MADNESS</div>
  <div class="links">
    <a href="index.html">Informações</a>
    <a href="progresso.html">Progresso</a>
    <a href="loot.html">Loot</a>
    <a href="#" id="logoutBtn" style="display:none;">Logout</a>
  </div>
</div>

<!-- Login Form -->
<div id="loginForm">
  <h3>Login Admin</h3>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Senha">
  <button id="loginBtn">Login</button>
</div>

<!-- Dashboard -->
<div id="adminContent" style="display:none;">

  <div class="container" id="dashboard">
    <div class="card">
      <h3>Total de Posts</h3>
      <p id="totalPosts">0</p>
    </div>
    <div class="card">
      <h3>Total de Loot</h3>
      <p id="totalLoot">0</p>
    </div>
    <div class="card">
      <h3>Raids Completadas</h3>
      <p id="raidsCompleted">0</p>
    </div>
  </div>

  <div class="container" id="charts">
    <canvas id="raidChart" width="400" height="200"></canvas>
  </div>

  <!-- Loot CRUD -->
  <div class="container">
    <div class="card">
      <h3>Gerenciar Loot</h3>
      <input type="text" id="lootPlayer" placeholder="Player">
      <input type="text" id="lootItem" placeholder="Item">
      <input type="text" id="lootType" placeholder="Tipo">
      <input type="date" id="lootDate">
      <button id="addLootBtn">Adicionar Loot</button>
      <table id="lootTable">
        <thead>
          <tr><th>Player</th><th>Item</th><th>Tipo</th><th>Data</th><th>Ações</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

</div>

<script type="module">
import { firebaseConfig } from "./config.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const loginForm = document.getElementById("loginForm");
const adminContent = document.getElementById("adminContent");
const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const lootTableBody = document.querySelector("#lootTable tbody");
const addLootBtn = document.getElementById("addLootBtn");

// Login
loginBtn.onclick = () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, pass)
    .then((userCredential) => {
      localStorage.setItem("admin","true");
      loginForm.style.display="none";
      adminContent.style.display="block";
      logoutBtn.style.display="inline-block";
      loadDashboard();
      loadLoot();
      alert("Login bem-sucedido!");
    })
    .catch((error) => {
      alert("Email ou senha incorretos!");
      console.log(error);
    });
};

// Logout
logoutBtn.onclick = () => {
  signOut(auth).then(() => {
    localStorage.removeItem("admin");
    window.location.reload();
  });
};

// Mantém conteúdo visível se já logado
onAuthStateChanged(auth, (user) => {
  if (user) {
    loginForm.style.display="none";
    adminContent.style.display="block";
    logoutBtn.style.display="inline-block";
    loadDashboard();
    loadLoot();
  } else {
    loginForm.style.display="block";
    adminContent.style.display="none";
    logoutBtn.style.display="none";
  }
});

// Dashboard
async function loadDashboard(){
  const postsSnap = await getDocs(collection(db,"posts"));
  const lootSnap = await getDocs(collection(db,"loot"));
  document.getElementById("totalPosts").innerText = postsSnap.size;
  document.getElementById("totalLoot").innerText = lootSnap.size;

  const raids = ["dreamrift","voidspire","quelthanas"];
  let completed=0;
  for(const raid of raids){
    const bossesSnap = await getDocs(collection(db,"progress"));
    let killed=0;
    let total=0;
    bossesSnap.forEach(doc=>{
      if(doc.id.startsWith(raid)){
        total++;
        if(doc.data().dead) killed++;
      }
    });
    if(total>0 && killed===total) completed++;
  }
  document.getElementById("raidsCompleted").innerText = completed;

  // Gráfico de linhas
  const ctx = document.getElementById('raidChart').getContext('2d');
  const labels = [];
  const progresses = [];
  for(const raid of raids){
    const bossesSnap = await getDocs(collection(db,"progress"));
    let killed=0, total=0;
    bossesSnap.forEach(doc=>{
      if(doc.id.startsWith(raid)){
        total++;
        if(doc.data().dead) killed++;
      }
    });
    labels.push(raid);
    progresses.push(total>0?Math.round((killed/total)*100):0);
  }

  new Chart(ctx,{
    type:'line',
    data:{
      labels:labels,
      datasets:[{
        label:'Progresso (%)',
        data:progresses,
        borderColor:'gold',
        backgroundColor:'rgba(255,215,0,0.2)',
        tension:0.3,
        fill:true
      }]
    },
    options:{responsive:true, scales:{y:{beginAtZero:true, max:100}}}
  });
}

// Loot CRUD
async function loadLoot(){
  lootTableBody.innerHTML="";
  const snap = await getDocs(collection(db,"loot"));
  snap.forEach(docItem=>{
    const row = document.createElement("tr");
    row.innerHTML = `<td>${docItem.data().player}</td>
                     <td>${docItem.data().item}</td>
                     <td>${docItem.data().type}</td>
                     <td>${docItem.data().date}</td>
                     <td><button data-id="${docItem.id}" class="deleteBtn">Excluir</button></td>`;
    lootTableBody.appendChild(row);
  });

  // Delete buttons
  document.querySelectorAll(".deleteBtn").forEach(btn=>{
    btn.onclick = async ()=>{
      const id = btn.dataset.id;
      await deleteDoc(doc(db,"loot",id));
      alert("Loot excluído!");
      loadLoot();
    };
  });
}

addLootBtn.onclick = async ()=>{
  const player = document.getElementById("lootPlayer").value;
  const item = document.getElementById("lootItem").value;
  const type = document.getElementById("lootType").value;
  const date = document.getElementById("lootDate").value;
  if(!player||!item||!type||!date){ alert("Preencha todos os campos!"); return; }
  await addDoc(collection(db,"loot"),{player,item,type,date});
  alert("Loot adicionado!");
  document.getElementById("lootPlayer").value="";
  document.getElementById("lootItem").value="";
  document.getElementById("lootType").value="";
  document.getElementById("lootDate").value="";
  loadLoot();
};
</script>

</body>
</html>
