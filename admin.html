<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Admin - Madness</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {
  background: linear-gradient(to bottom, #0a0a0a, #111);
  color: gold;
  font-family: "Friz Quadrata", Arial, sans-serif;
  margin: 0;
  padding: 0;
}

.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: #111;
  color: gold;
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
  border-bottom: 3px solid gold;
}

.navbar .links a {
  color: gold;
  margin-left: 20px;
  text-decoration: none;
  font-weight: bold;
  position: relative;
  transition: 0.3s;
}

.navbar .links a.active::after {
  content: '';
  position: absolute;
  bottom: -4px;
  left: 0;
  width: 100%;
  height: 3px;
  background: gold;
  box-shadow: 0 0 8px gold;
  border-radius: 2px;
}

.navbar .links a:hover {
  color: #ffd700;
  text-shadow: 0 0 6px #ffd700;
}

.container {
  margin-top: 80px;
  padding: 20px;
  display: flex;
  flex-wrap: wrap;
  gap: 25px;
}

.card {
  background: linear-gradient(145deg, #1b1b1b, #111);
  padding: 25px;
  border-radius: 12px;
  border: 2px solid gold;
  box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
  transition: transform 0.3s, box-shadow 0.3s;
  width: 320px;
}
.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px #ffd700;
}

.card h3 {
  margin-top: 0;
  color: gold;
  text-shadow: 0 0 4px #ffd700;
}

#charts {
  display: flex;
  flex-wrap: wrap;
  gap: 25px;
  margin-top: 20px;
}

canvas {
  background: #111;
  border: 1px solid gold;
  border-radius: 12px;
  padding: 10px;
}

button {
  padding: 6px 12px;
  border-radius: 6px;
  background: #111;
  color: gold;
  border: 1px solid gold;
  cursor: pointer;
  transition: all 0.3s;
  font-weight: bold;
}
button:hover {
  background: #222;
  box-shadow: 0 0 10px #ffd700;
}

#loginForm {
  max-width: 420px;
  margin: 120px auto;
  background: #111;
  padding: 25px;
  border: 2px solid gold;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

#loginForm input {
  padding: 7px;
  border-radius: 6px;
  background: #222;
  color: gold;
  border: 1px solid gold;
  font-weight: bold;
}

#lootTable {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
  background: linear-gradient(120deg, #1c1c1c, #111);
  border-radius: 8px;
  overflow: hidden;
}

#lootTable th, #lootTable td {
  padding: 10px;
  text-align: left;
  border-bottom: 1px solid gold;
}

#lootTable th {
  background: #222;
}

tr:nth-child(even) { background: #1c1c1c; }
tr:nth-child(odd) { background: #111; }

.popup {
  position: fixed;
  top: 20px;
  right: 20px;
  background: #222;
  color: gold;
  border: 2px solid gold;
  padding: 10px 20px;
  border-radius: 10px;
  box-shadow: 0 0 10px gold;
  display: none;
  z-index: 2000;
  animation: fadeInOut 3s forwards;
}
@keyframes fadeInOut {
  0% {opacity: 0; transform: translateY(-10px);}
  10% {opacity: 1; transform: translateY(0);}
  90% {opacity: 1; transform: translateY(0);}
  100% {opacity: 0; transform: translateY(-10px);}
}
</style>
</head>
<body>

<div class="navbar">
  <div class="logo">MADNESS</div>
  <div class="links">
    <a href="index.html">Informações</a>
    <a href="progresso.html">Progresso</a>
    <a href="loot.html">Loot</a>
    <a href="#" id="logoutBtn" style="display:none;">Logout</a>
  </div>
</div>

<div id="loginForm">
  <h3>Login Admin</h3>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Senha">
  <button id="loginBtn">Login</button>
</div>

<div id="adminContent" style="display:none;">

  <div class="container" id="dashboard">
    <div class="card">
      <h3>Total de Posts</h3>
      <p id="totalPosts">0</p>
    </div>
    <div class="card">
      <h3>Total de Loot</h3>
      <p id="totalLoot">0</p>
    </div>
    <div class="card">
      <h3>Raids Completadas</h3>
      <p id="raidsCompleted">0</p>
    </div>
  </div>

  <div class="container" id="charts">
    <canvas id="raidChart" width="400" height="200"></canvas>
  </div>

  <div class="container">
    <div class="card">
      <h3>Gerenciar Loot</h3>
      <div style="display:flex; gap:5px; flex-wrap:wrap;">
        <input type="text" id="lootPlayer" placeholder="Player">
        <input type="text" id="lootItem" placeholder="Item">
        <input type="text" id="lootType" placeholder="Tipo">
        <input type="date" id="lootDate">
        <button id="addLootBtn">Adicionar Loot</button>
      </div>
      <table id="lootTable">
        <thead>
          <tr><th>Player</th><th>Item</th><th>Tipo</th><th>Data</th><th>Ações</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

</div>

<div class="popup" id="popupMsg"></div>

<script type="module">
import { firebaseConfig } from "./config.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const loginForm = document.getElementById("loginForm");
const adminContent = document.getElementById("adminContent");
const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const lootTableBody = document.querySelector("#lootTable tbody");
const addLootBtn = document.getElementById("addLootBtn");
const popup = document.getElementById("popupMsg");

function showPopup(msg){
  popup.innerText = msg;
  popup.style.display = "block";
  setTimeout(()=>{popup.style.display="none";},3000);
}

// Login
loginBtn.onclick = () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, pass)
    .then((userCredential) => {
      localStorage.setItem("admin","true");
      loginForm.style.display="none";
      adminContent.style.display="block";
      logoutBtn.style.display="inline-block";
      loadDashboard();
      loadLoot();
      showPopup("Login bem-sucedido!");
    })
    .catch((error) => {
      showPopup("Email ou senha incorretos!");
      console.log(error);
    });
};

// Logout
logoutBtn.onclick = () => {
  signOut(auth).then(() => {
    localStorage.removeItem("admin");
    window.location.reload();
  });
};

// Mantém conteúdo visível se já logado
onAuthStateChanged(auth, (user) => {
  if (user) {
    loginForm.style.display="none";
    adminContent.style.display="block";
    logoutBtn.style.display="inline-block";
    loadDashboard();
    loadLoot();
  } else {
    loginForm.style.display="block";
    adminContent.style.display="none";
    logoutBtn.style.display="none";
  }
});

// Dashboard
async function loadDashboard(){
  const postsSnap = await getDocs(collection(db,"posts"));
  const lootSnap = await getDocs(collection(db,"loot"));
  document.getElementById("totalPosts").innerText = postsSnap.size;
  document.getElementById("totalLoot").innerText = lootSnap.size;

  const raids = ["dreamrift","voidspire","quelthanas"];
  let completed=0;
  for(const raid of raids){
    const bossesSnap = await getDocs(collection(db,"progress"));
    let killed=0, total=0;
    bossesSnap.forEach(doc=>{
      if(doc.id.startsWith(raid)){
        total++;
        if(doc.data().dead) killed++;
      }
    });
    if(total>0 && killed===total) completed++;
  }
  document.getElementById("raidsCompleted").innerText = completed;

  const ctx = document.getElementById('raidChart').getContext('2d');
  const labels = [];
  const progresses = [];
  for(const raid of raids){
    const bossesSnap = await getDocs(collection(db,"progress"));
    let killed=0, total=0;
    bossesSnap.forEach(doc=>{
      if(doc.id.startsWith(raid)){
        total++;
        if(doc.data().dead) killed++;
      }
    });
    labels.push(raid);
    progresses.push(total>0?Math.round((killed/total)*100):0);
  }

  new Chart(ctx,{
    type:'line',
    data:{
      labels:labels,
      datasets:[{
        label:'Progresso (%)',
        data:progresses,
        borderColor:'gold',
        backgroundColor:'rgba(255,215,0,0.2)',
        tension:0.3,
        fill:true
      }]
    },
    options:{responsive:true, scales:{y:{beginAtZero:true, max:100}}}
  });
}

// Loot CRUD
async function loadLoot(){
  lootTableBody.innerHTML="";
  const snap = await getDocs(collection(db,"loot"));
  snap.forEach(docItem=>{
    const row = document.createElement("tr");
    row.innerHTML = `<td>${docItem.data().player}</td>
                     <td>${docItem.data().item}</td>
                     <td>${docItem.data().type}</td>
                     <td>${docItem.data().date}</td>
                     <td><button data-id="${docItem.id}" class="deleteBtn">Excluir</button></td>`;
    lootTableBody.appendChild(row);
  });

  document.querySelectorAll(".deleteBtn").forEach(btn=>{
    btn.onclick = async ()=>{
      const id = btn.dataset.id;
      await deleteDoc(doc(db,"loot",id));
      showPopup("Loot excluído!");
      loadLoot();
    };
  });
}

addLootBtn.onclick = async ()=>{
  const player = document.getElementById("lootPlayer").value;
  const item = document.getElementById("lootItem").value;
  const type = document.getElementById("lootType").value;
  const date = document.getElementById("lootDate").value;
  if(!player||!item||!type||!date){ showPopup("Preencha todos os campos!"); return; }
  await addDoc(collection(db,"loot"),{player,item,type,date});
  showPopup("Loot adicionado!");
  document.getElementById("lootPlayer").value="";
  document.getElementById("lootItem").value="";
  document.getElementById("lootType").value="";
  document.getElementById("lootDate").value="";
  loadLoot();
};
</script>

</body>
</html>
