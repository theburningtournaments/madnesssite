<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Admin - Madness</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { background: linear-gradient(to bottom, #0a0a0a, #111); color: gold; font-family: Arial, sans-serif; margin:0; }
.navbar { position: fixed; top:0; width:100%; background:#111; padding:12px 20px; display:flex; justify-content:space-between; border-bottom:2px solid gold; z-index:1000; }
.sidebar { position:fixed; top:60px; left:0; width:220px; height:100%; background:#0d0d0d; border-right:2px solid gold; padding-top:20px; display:flex; flex-direction:column; }
.menu-item { display:block; padding:12px 20px; color:gold; text-decoration:none; cursor:pointer; }
.menu-item:hover, .menu-item.active { background:#1a1a1a; border-left:3px solid gold; }
#sidebarLogout, #homeBtn { margin:20px 10px 0 10px; padding:10px; background:#111; color:gold; border:1px solid gold; cursor:pointer; }
.container { margin-left:240px; margin-top:80px; padding:20px; display:flex; flex-wrap:wrap; gap:20px; }
.card { background:#111; padding:20px; border:2px solid gold; border-radius:10px; width:300px; }
.card p { font-size:26px; font-weight:bold; margin:0; }
input, textarea, button { margin:5px 5px 5px 0; padding:5px; border-radius:5px; border:1px solid gold; background:#111; color:gold; }
textarea { width:100%; height:60px; }
table { width:100%; margin-top:10px; border-collapse:collapse; }
th, td { padding:10px; border-bottom:1px solid gold; text-align:left; vertical-align:middle; color:gold; }
th { background:#222; }
td img.postImage { width:80px; height:auto; display:block; margin:0 auto; border-radius:4px; }
tr:nth-child(even) { background: #1c1c1c; }
tr:nth-child(odd) { background: #111; }
button { padding:4px 8px; border-radius:4px; background:#111; color:gold; border:1px solid gold; cursor:pointer; font-weight:bold; transition: all 0.3s; }
button:hover { background:#222; box-shadow: 0 0 10px #ffd700; }
#loginForm { max-width:400px; margin:120px auto; background:#111; padding:20px; border:2px solid gold; display:flex; flex-direction:column; gap:10px; }
</style>
</head>
<body>

<div class="navbar">MADNESS ADMIN</div>

<div id="loginForm">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button id="loginBtn">Login</button>
</div>

<div id="adminContent" style="display:none;">

  <div class="sidebar" id="sidebar">
    <div class="menu-item active" data-section="dashboard">📊 Gráficos</div>
    <div class="menu-item" data-section="loot">🎁 Loot</div>
    <div class="menu-item" data-section="players">👥 Players</div>
    <div class="menu-item" data-section="bank">🏦 Guild Bank</div>
    <div class="menu-item" data-section="posts">📝 Posts</div>
    <div class="menu-item" id="homeBtn">🏠 Home</div>
    <button id="sidebarLogout">Logout</button>
  </div>

  <!-- DASHBOARD -->
  <div class="container" id="dashboard">
    <div class="card"><p id="totalPosts">0</p><span>Posts</span></div>
    <div class="card"><p id="totalLoot">0</p><span>Loot</span></div>
    <div class="card"><p id="raidsCompleted">0</p><span>Raids</span></div>
  </div>
  <div class="container" id="charts"><canvas id="raidChart"></canvas></div>

  <!-- LOOT -->
  <div class="container" id="lootSection" style="display:none;">
    <div class="card" style="width:100%;">
      <h3>Loot</h3>
      <input id="lootPlayer" placeholder="Player">
      <input id="lootItem" placeholder="Item">
      <input id="lootType" placeholder="Tipo">
      <input type="date" id="lootDate">
      <button id="addLootBtn">Adicionar</button>
      <table id="lootTable">
        <thead><tr><th>Player</th><th>Item</th><th>Tipo</th><th>Data</th><th>Ações</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- PLAYERS -->
  <div class="container" id="playersSection" style="display:none;">
    <div class="card" style="width:100%;">
      <h3>Players Guild</h3>
      <input id="playerName" placeholder="Nome">
      <input id="playerClass" placeholder="Classe">
      <input id="playerIlvl" placeholder="iLvl">
      <input id="playerEnchats" placeholder="Enchats">
      <button id="addPlayerBtn">Adicionar</button>
      <table id="playersTable">
        <thead><tr><th>Nome</th><th>Classe</th><th>iLvl</th><th>Enchats</th><th>Ações</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- GUILD BANK -->
  <div class="container" id="bankSection" style="display:none;">
    <div class="card" style="width:100%;">
      <h3>Guild Bank / BOE</h3>
      <input id="bankPlayer" placeholder="Player">
      <input id="bankGoldPlayer" placeholder="Gold Player">
      <input id="bankGoldGuild" placeholder="Gold Guild">
      <input id="bankItem" placeholder="Item">
      <input type="date" id="bankDate">
      <button id="addBankBtn">Adicionar</button>
      <table id="bankTable">
        <thead><tr><th>Player</th><th>Gold Player</th><th>Gold Guild</th><th>Item</th><th>Data</th><th>Ações</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- POSTS -->
  <div class="container" id="postsSection" style="display:none;">
    <div class="card" style="width:100%;">
      <h3>Posts</h3>
      <input id="postTitle" placeholder="Título">
      <textarea id="postContent" placeholder="Conteúdo"></textarea>
      <input type="text" id="postImageURL" placeholder="URL da imagem (opcional)">
      <button id="addPostBtn">Publicar</button>
      <table id="postsTable">
        <thead><tr><th>Título</th><th>Conteúdo</th><th>Imagem</th><th>Ações</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

</div>

<script type="module">
import { firebaseConfig } from "./config.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, getDocs, setDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const loginForm = document.getElementById("loginForm");
const adminContent = document.getElementById("adminContent");
const sidebar = document.getElementById("sidebar");

const dashboard = document.getElementById("dashboard");
const charts = document.getElementById("charts");
const lootSection = document.getElementById("lootSection");
const playersSection = document.getElementById("playersSection");
const bankSection = document.getElementById("bankSection");
const postsSection = document.getElementById("postsSection");

// LOGIN
document.getElementById("loginBtn").onclick = async () => {
  try {
    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;
    await signInWithEmailAndPassword(auth, email, pass);
    loginForm.style.display="none";
    adminContent.style.display="block";
    localStorage.setItem("admin","true");
    loadAllData();
    initMenu();
  } catch(e){ alert("Email ou senha incorretos!"); }
};

// LOGOUT
document.getElementById("sidebarLogout").onclick = async () => {
  await signOut(auth);
  localStorage.removeItem("admin");
  window.location.href="index.html";
};

// MENU
function initMenu(){
  const menuItems = sidebar.querySelectorAll(".menu-item");
  menuItems.forEach(item => {
    item.onclick = () => {
      menuItems.forEach(i=>i.classList.remove("active"));
      item.classList.add("active");
      dashboard.style.display=charts.style.display=lootSection.style.display=playersSection.style.display=bankSection.style.display=postsSection.style.display="none";
      if(item.dataset.section==="dashboard"){dashboard.style.display="flex"; charts.style.display="flex";}
      if(item.dataset.section==="loot") lootSection.style.display="flex";
      if(item.dataset.section==="players") playersSection.style.display="flex";
      if(item.dataset.section==="bank") bankSection.style.display="flex";
      if(item.dataset.section==="posts") postsSection.style.display="flex";
    };
  });

  document.getElementById("homeBtn").onclick = ()=>{
    localStorage.setItem("admin","true");
    window.location.href="index.html";
  };
}

// DASHBOARD
async function updateDashboard(){
  const postsSnap = await getDocs(collection(db,"posts"));
  const lootSnap = await getDocs(collection(db,"loot"));
  document.getElementById("totalPosts").innerText = postsSnap.size;
  document.getElementById("totalLoot").innerText = lootSnap.size;
  const raids = ["dreamrift","voidspire","quelthanas"];
  let completed=0;
  const snapProgress = await getDocs(collection(db,"progress"));
  for(const raid of raids){
    let total=0,killed=0;
    snapProgress.forEach(d=>{if(d.id.startsWith(raid)){total++; if(d.data().dead) killed++;}});
    if(total>0 && killed===total) completed++;
  }
  document.getElementById("raidsCompleted").innerText = completed;
}

// LOAD ALL
async function loadAllData(){
  await loadLoot();
  await loadPlayers();
  await loadBank();
  await loadPosts();
  await loadRaidCharts();
  await updateDashboard();
}

// --- LOOT
async function loadLoot(){
  const tbody=document.querySelector("#lootTable tbody"); tbody.innerHTML="";
  const snap=await getDocs(collection(db,"loot"));
  snap.forEach(d=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`<td>${d.data().player}</td><td>${d.data().item}</td><td>${d.data().type}</td><td>${d.data().date}</td><td><button>X</button></td>`;
    tr.querySelector("button").onclick=async()=>{await deleteDoc(doc(db,"loot",d.id)); loadLoot(); updateDashboard();};
    tbody.appendChild(tr);
  });
}
document.getElementById("addLootBtn").onclick=async()=>{
  const player=document.getElementById("lootPlayer").value;
  const item=document.getElementById("lootItem").value;
  const type=document.getElementById("lootType").value;
  const date=document.getElementById("lootDate").value;
  if(!player||!item||!type||!date){alert("Preencha todos os campos!"); return;}
  const id = `${player}_${item}_${date}`;
  await setDoc(doc(db,"loot",id), {player,item,type,date});
  document.getElementById("lootPlayer").value=""; document.getElementById("lootItem").value=""; document.getElementById("lootType").value=""; document.getElementById("lootDate").value="";
  loadLoot(); updateDashboard();
};

// --- PLAYERS
async function loadPlayers(){
  const tbody=document.querySelector("#playersTable tbody"); tbody.innerHTML="";
  const snap=await getDocs(collection(db,"players"));
  snap.forEach(d=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`<td>${d.data().name}</td><td>${d.data().class}</td><td>${d.data().ilvl}</td><td>${d.data().enchats}</td><td><button>X</button></td>`;
    tr.querySelector("button").onclick=async()=>{await deleteDoc(doc(db,"players",d.id)); loadPlayers();};
    tbody.appendChild(tr);
  });
}
document.getElementById("addPlayerBtn").onclick=async()=>{
  const n=document.getElementById("playerName").value;
  const c=document.getElementById("playerClass").value;
  const il=document.getElementById("playerIlvl").value;
  const e=document.getElementById("playerEnchats").value;
  if(!n||!c||!il){alert("Preencha todos os campos!"); return;}
  const id = n;
  await setDoc(doc(db,"players",id),{name:n,class:c,ilvl:il,enchats:e});
  document.getElementById("playerName").value=""; document.getElementById("playerClass").value=""; document.getElementById("playerIlvl").value=""; document.getElementById("playerEnchats").value="";
  loadPlayers();
};

// --- GUILD BANK
async function loadBank(){
  const tbody=document.querySelector("#bankTable tbody"); tbody.innerHTML="";
  const snap=await getDocs(collection(db,"bank"));
  snap.forEach(d=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`<td>${d.data().player}</td><td>${d.data().goldPlayer}</td><td>${d.data().goldGuild}</td><td>${d.data().item}</td><td>${d.data().date}</td><td><button>X</button></td>`;
    tr.querySelector("button").onclick=async()=>{await deleteDoc(doc(db,"bank",d.id)); loadBank();};
    tbody.appendChild(tr);
  });
}
document.getElementById("addBankBtn").onclick=async()=>{
  const p=document.getElementById("bankPlayer").value;
  const gp=document.getElementById("bankGoldPlayer").value;
  const gg=document.getElementById("bankGoldGuild").value;
  const it=document.getElementById("bankItem").value;
  const d=document.getElementById("bankDate").value;
  if(!p||!gp||!gg||!it||!d){alert("Preencha todos os campos!"); return;}
  const id = `${p}_${it}_${d}`;
  await setDoc(doc(db,"bank",id),{player:p,goldPlayer:gp,goldGuild:gg,item:it,date:d});
  document.getElementById("bankPlayer").value=""; document.getElementById("bankGoldPlayer").value=""; document.getElementById("bankGoldGuild").value=""; document.getElementById("bankItem").value=""; document.getElementById("bankDate").value="";
  loadBank();
};

// --- POSTS
async function loadPosts(){
  const tbody=document.querySelector("#postsTable tbody"); tbody.innerHTML="";
  const snap=await getDocs(collection(db,"posts"));
  snap.forEach(d=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td>${d.data().title}</td>
      <td>${d.data().content}</td>
      <td>${d.data().imageURL ? `<img class="postImage" src="${d.data().imageURL}">` : ''}</td>
      <td><button>X</button></td>
    `;
    tr.querySelector("button").onclick=async()=>{await deleteDoc(doc(db,"posts",d.id)); loadPosts(); updateDashboard();};
    tbody.appendChild(tr);
  });
}

document.getElementById("addPostBtn").addEventListener("click", async ()=>{
  const t=document.getElementById("postTitle").value;
  const c=document.getElementById("postContent").value;
  const imageURL=document.getElementById("postImageURL").value.trim();
  if(!t||!c){alert("Preencha título e conteúdo!"); return;}
  const id=t+"_"+Date.now();
  await setDoc(doc(db,"posts",id),{title:t,content:c,imageURL,date:new Date().toISOString()});
  document.getElementById("postTitle").value="";
  document.getElementById("postContent").value="";
  document.getElementById("postImageURL").value="";
  loadPosts();
  updateDashboard();
});

// --- RAID CHART
async function loadRaidCharts(){
  const raids=["dreamrift","voidspire","quelthanas"];
  const ctx=document.getElementById('raidChart').getContext('2d');
  const labels=[]; const progresses=[];
  const snap=await getDocs(collection(db,"progress"));
  raids.forEach(raid=>{
    let total=0,killed=0;
    snap.forEach(doc=>{if(doc.id.startsWith(raid)){total++;if(doc.data().dead) killed++;}});
    labels.push(raid);
    progresses.push(total?Math.round((killed/total)*100):0);
  });
  new Chart(ctx,{type:'line',data:{labels:labels,datasets:[{label:'Progresso (%)',data:progresses,borderColor:'gold',backgroundColor:'rgba(255,215,0,0.2)',fill:true,tension:0.3}]},options:{responsive:true,scales:{y:{beginAtZero:true,max:100}}}});
}

// MANTER LOGIN
onAuthStateChanged(auth,(user)=>{
  if(user){ loginForm.style.display="none"; adminContent.style.display="block"; localStorage.setItem("admin","true"); loadAllData(); initMenu();}
});
</script>
</body>
</html>
