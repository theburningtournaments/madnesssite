<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Admin - Madness</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* BACKGROUND */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
}

/* NAVBAR (mantida) */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  z-index: 1000;
}

.navbar a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
}

/* LAYOUT */
.dashboard-layout {
  display: flex;
  margin-top: 60px;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  height: calc(100vh - 60px);
  padding: 20px;
  position: fixed;

  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
}

.sidebar li {
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  cursor: pointer;
}

.sidebar li:hover {
  background: rgba(0,153,255,0.3);
}

/* MAIN */
.main {
  margin-left: 240px;
  padding: 20px;
  width: 100%;
}

/* CARDS */
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 20px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap: 20px;
}

/* INPUT */
input {
  padding: 8px;
  border-radius: 8px;
  border: none;
}

/* BUTTON */
button {
  background: linear-gradient(135deg,#00c6ff,#0072ff);
  border: none;
  padding: 10px;
  border-radius: 10px;
  color: white;
  cursor: pointer;
}

/* TABLE */
table {
  width: 100%;
  margin-top: 10px;
}

td,th {
  padding: 8px;
}

/* LOGIN */
#loginForm {
  max-width: 400px;
  margin: 120px auto;
  padding: 30px;
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
}

/* SEARCH */
.search {
  margin-bottom: 10px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div>MADNESS ADMIN</div>
  <div>
    <a href="index.html">Informações</a>
    <a href="progresso.html">Progresso</a>
    <a href="loot.html">Loot</a>
    <a href="#" id="logoutBtn" style="display:none;">Logout</a>
  </div>
</div>

<!-- LOGIN -->
<div id="loginForm">
  <h3>Login Admin</h3>
  <input type="email" id="email" placeholder="Email"><br><br>
  <input type="password" id="password" placeholder="Senha"><br><br>
  <button id="loginBtn">Login</button>
</div>

<!-- DASHBOARD -->
<div id="adminContent" style="display:none;">
<div class="dashboard-layout">

<!-- SIDEBAR -->
<ul class="sidebar">
  <li>Dashboard</li>
  <li>Analytics</li>
  <li>Loot Manager</li>
</ul>

<!-- MAIN -->
<div class="main">

<!-- STATS -->
<div class="grid">
  <div class="card"><h3>Posts</h3><p id="totalPosts"></p></div>
  <div class="card"><h3>Loot</h3><p id="totalLoot"></p></div>
  <div class="card"><h3>Raids</h3><p id="raidsCompleted"></p></div>
</div>

<!-- CHART -->
<div class="card">
  <canvas id="raidChart"></canvas>
</div>

<!-- LOOT -->
<div class="card">
  <h3>Loot Manager</h3>

  <input class="search" type="text" id="searchLoot" placeholder="Pesquisar...">

  <div>
    <input id="lootPlayer" placeholder="Player">
    <input id="lootItem" placeholder="Item">
    <input id="lootType" placeholder="Tipo">
    <input type="date" id="lootDate">
    <button id="addLootBtn">Adicionar</button>
  </div>

  <table id="lootTable">
    <thead>
      <tr><th>Player</th><th>Item</th><th>Tipo</th><th>Data</th><th></th></tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

</div>
</div>
</div>

<script type="module">
import { firebaseConfig } from "./config.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const loginForm = document.getElementById("loginForm");
const adminContent = document.getElementById("adminContent");
const logoutBtn = document.getElementById("logoutBtn");

/* LOGIN */
loginBtn.onclick = () => {
  signInWithEmailAndPassword(auth,email.value,password.value)
  .then(()=>{
    loginForm.style.display="none";
    adminContent.style.display="block";
    logoutBtn.style.display="inline";
    loadAll();
  });
};

logoutBtn.onclick = ()=> signOut(auth).then(()=>location.reload());

onAuthStateChanged(auth,user=>{
  if(user){
    loginForm.style.display="none";
    adminContent.style.display="block";
    logoutBtn.style.display="inline";
    loadAll();
  }
});

/* LOAD ALL */
async function loadAll(){
  loadDashboard();
  loadLoot();
}

/* DASHBOARD */
async function loadDashboard(){
  const posts = await getDocs(collection(db,"posts"));
  const loot = await getDocs(collection(db,"loot"));

  totalPosts.innerText = posts.size;
  totalLoot.innerText = loot.size;
  raidsCompleted.innerText = Math.floor(Math.random()*5);

  new Chart(raidChart,{
    type:'bar',
    data:{
      labels:["Dreamrift","Voidspire","Quelthanas"],
      datasets:[{
        label:"Progress",
        data:[40,70,90]
      }]
    }
  });
}

/* LOOT */
let allLoot=[];

async function loadLoot(){
  const snap = await getDocs(collection(db,"loot"));
  allLoot=[];
  lootTable.innerHTML="";

  snap.forEach(docItem=>{
    const data = docItem.data();
    allLoot.push({...data,id:docItem.id});
  });

  renderLoot(allLoot);
}

function renderLoot(data){
  lootTable.querySelector("tbody").innerHTML="";
  data.forEach(item=>{
    const row = `
      <tr>
        <td>${item.player}</td>
        <td>${item.item}</td>
        <td>${item.type}</td>
        <td>${item.date}</td>
        <td><button onclick="deleteLoot('${item.id}')">X</button></td>
      </tr>`;
    lootTable.querySelector("tbody").innerHTML+=row;
  });
}

window.deleteLoot = async (id)=>{
  await deleteDoc(doc(db,"loot",id));
  loadLoot();
}

/* SEARCH */
searchLoot.oninput = ()=>{
  const val = searchLoot.value.toLowerCase();
  const filtered = allLoot.filter(l=>l.player.toLowerCase().includes(val));
  renderLoot(filtered);
}

/* ADD */
addLootBtn.onclick = async ()=>{
  await addDoc(collection(db,"loot"),{
    player:lootPlayer.value,
    item:lootItem.value,
    type:lootType.value,
    date:lootDate.value
  });
  loadLoot();
}
</script>

</body>
</html>
