<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Admin - Madness</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  background: linear-gradient(to bottom, #0a0a0a, #111);
  color: gold;
  font-family: Arial;
  margin: 0;
}

/* NAVBAR */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: #111;
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  border-bottom: 2px solid gold;
  z-index: 1000;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  top: 60px;
  left: 0;
  width: 220px;
  height: 100%;
  background: #0d0d0d;
  border-right: 2px solid gold;
  padding-top: 20px;
}

.menu-item {
  display: block;
  padding: 12px 20px;
  color: gold;
  text-decoration: none;
  cursor: pointer;
}

.menu-item:hover,
.menu-item.active {
  background: #1a1a1a;
  border-left: 3px solid gold;
}

/* CONTAINER */
.container {
  margin-left: 240px;
  margin-top: 80px;
  padding: 20px;
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
}

.card {
  background: #111;
  padding: 20px;
  border: 2px solid gold;
  border-radius: 10px;
  width: 300px;
}

.card p {
  font-size: 26px;
  font-weight: bold;
}

/* TABLE */
table {
  width: 100%;
  margin-top: 10px;
  border-collapse: collapse;
}

th, td {
  padding: 8px;
  border-bottom: 1px solid gold;
}

/* LOGIN */
#loginForm {
  max-width: 400px;
  margin: 120px auto;
  background: #111;
  padding: 20px;
  border: 2px solid gold;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
</style>
</head>

<body>

<div class="navbar">
  <div>MADNESS ADMIN</div>
  <button id="logoutBtn" style="display:none;">Logout</button>
</div>

<div class="sidebar">
  <div class="menu-item active" data-section="dashboard">📊 Gráficos</div>
  <div class="menu-item" data-section="loot">🎁 Loot</div>
  <div class="menu-item" data-section="players">👥 Players</div>
  <div class="menu-item" data-section="bank">🏦 Guild Bank</div>
</div>

<!-- LOGIN -->
<div id="loginForm">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button id="loginBtn">Login</button>
</div>

<!-- ADMIN -->
<div id="adminContent" style="display:none;">

  <!-- DASHBOARD -->
  <div class="container" id="dashboard">
    <div class="card"><p id="totalPosts">0</p><span>Posts</span></div>
    <div class="card"><p id="totalLoot">0</p><span>Loot</span></div>
    <div class="card"><p id="raidsCompleted">0</p><span>Raids</span></div>
  </div>

  <div class="container" id="charts">
    <canvas id="raidChart"></canvas>
  </div>

  <!-- LOOT -->
  <div class="container" id="lootSection" style="display:none;">
    <div class="card" style="width:100%;">
      <h3>Loot</h3>

      <input id="lootPlayer" placeholder="Player">
      <input id="lootItem" placeholder="Item">
      <input id="lootType" placeholder="Tipo">
      <input type="date" id="lootDate">
      <button id="addLootBtn">Adicionar</button>

      <table id="lootTable">
        <thead>
          <tr><th>Player</th><th>Item</th><th>Tipo</th><th>Data</th><th></th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- PLAYERS -->
  <div class="container" id="playersSection" style="display:none;">
    <div class="card" style="width:100%;">
      <h3>Players Guild</h3>

      <input id="playerName" placeholder="Nome">
      <input id="playerClass" placeholder="Classe">
      <input id="playerIlvl" placeholder="iLvl">
      <button id="addPlayerBtn">Adicionar</button>

      <table id="playersTable">
        <thead>
          <tr><th>Nome</th><th>Classe</th><th>iLvl</th><th></th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- BANK -->
  <div class="container" id="bankSection" style="display:none;">
    <div class="card" style="width:100%;">
      <h3>Guild Bank / BOE</h3>

      <input id="bankItem" placeholder="Item">
      <input id="bankValue" placeholder="Gold">
      <button id="addBankBtn">Adicionar</button>

      <table id="bankTable">
        <thead>
          <tr><th>Item</th><th>Gold</th><th></th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

</div>

<script type="module">
import { firebaseConfig } from "./config.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* MENU */
const menuItems = document.querySelectorAll(".menu-item");

menuItems.forEach(item=>{
  item.onclick=()=>{
    menuItems.forEach(i=>i.classList.remove("active"));
    item.classList.add("active");

    dashboard.style.display="none";
    charts.style.display="none";
    lootSection.style.display="none";
    playersSection.style.display="none";
    bankSection.style.display="none";

    if(item.dataset.section==="dashboard"){
      dashboard.style.display="flex";
      charts.style.display="flex";
    }
    if(item.dataset.section==="loot") lootSection.style.display="flex";
    if(item.dataset.section==="players") playersSection.style.display="flex";
    if(item.dataset.section==="bank") bankSection.style.display="flex";
  };
});

/* LOGIN */
loginBtn.onclick=()=>{
  signInWithEmailAndPassword(auth,email.value,password.value)
  .then(()=>{
    loginForm.style.display="none";
    adminContent.style.display="block";
  });
};

/* LOAD DATA */
async function loadLoot(){
  const tbody=document.querySelector("#lootTable tbody");
  tbody.innerHTML="";
  const snap=await getDocs(collection(db,"loot"));
  snap.forEach(d=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td>${d.data().player}</td>
      <td>${d.data().item}</td>
      <td>${d.data().type}</td>
      <td>${d.data().date}</td>
      <td><button>X</button></td>`;
    tr.querySelector("button").onclick=async()=>{
      await deleteDoc(doc(db,"loot",d.id));
      loadLoot();
    };
    tbody.appendChild(tr);
  });
}

async function loadPlayers(){
  const tbody=document.querySelector("#playersTable tbody");
  tbody.innerHTML="";
  const snap=await getDocs(collection(db,"players"));
  snap.forEach(d=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td>${d.data().name}</td>
      <td>${d.data().class}</td>
      <td>${d.data().ilvl}</td>
      <td><button>X</button></td>`;
    tr.querySelector("button").onclick=async()=>{
      await deleteDoc(doc(db,"players",d.id));
      loadPlayers();
    };
    tbody.appendChild(tr);
  });
}

async function loadBank(){
  const tbody=document.querySelector("#bankTable tbody");
  tbody.innerHTML="";
  const snap=await getDocs(collection(db,"bank"));
  snap.forEach(d=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td>${d.data().item}</td>
      <td>${d.data().value}</td>
      <td><button>X</button></td>`;
    tr.querySelector("button").onclick=async()=>{
      await deleteDoc(doc(db,"bank",d.id));
      loadBank();
    };
    tbody.appendChild(tr);
  });
}

/* ADD */
addLootBtn.onclick=async()=>{
  await addDoc(collection(db,"loot"),{
    player:lootPlayer.value,
    item:lootItem.value,
    type:lootType.value,
    date:lootDate.value
  });
  loadLoot();
};

addPlayerBtn.onclick=async()=>{
  await addDoc(collection(db,"players"),{
    name:playerName.value,
    class:playerClass.value,
    ilvl:playerIlvl.value
  });
  loadPlayers();
};

addBankBtn.onclick=async()=>{
  await addDoc(collection(db,"bank"),{
    item:bankItem.value,
    value:bankValue.value
  });
  loadBank();
};

/* AUTH */
onAuthStateChanged(auth,user=>{
  if(user){
    loginForm.style.display="none";
    adminContent.style.display="block";
    loadLoot();
    loadPlayers();
    loadBank();
  }
});
</script>

</body>
</html>
