<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<hr>

<h2>Criar Post</h2>
<input id="title" placeholder="Título">
<textarea id="content"></textarea>
<button onclick="addPost()">Publicar</button>

<hr>

<h2>Adicionar Loot</h2>
<input id="player" placeholder="Player">
<input id="item" placeholder="Item">
<input id="type" placeholder="Tipo">
<button onclick="addLoot()">Adicionar</button>

<script type="module">
import { firebaseConfig } from "./config.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.login = function(){
  signInWithEmailAndPassword(
    auth,
    email.value,
    pass.value
  ).then(()=> alert("OK"))
   .catch(e=>alert(e.message));
}

window.addPost = async function(){
  await addDoc(collection(db,"posts"),{
    title: title.value,
    content: content.value,
    date: new Date().toLocaleDateString()
  });
  alert("Post criado");
}

window.addLoot = async function(){
  await addDoc(collection(db,"loot"),{
    player: player.value,
    item: item.value,
    type: type.value,
    date: new Date().toLocaleDateString()
  });
  alert("Loot adicionado");
}
</script>

</body>
</html>
