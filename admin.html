<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Admin - Madness</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  background: linear-gradient(to bottom, #0a0a0a, #111);
  color: gold;
  font-family: "Friz Quadrata", Arial, sans-serif;
  margin: 0;
  padding: 0;
}

/* NAVBAR */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: #111;
  color: gold;
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
  border-bottom: 3px solid gold;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  top: 60px;
  left: 0;
  width: 220px;
  height: 100%;
  background: #0d0d0d;
  border-right: 2px solid gold;
  padding-top: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.menu-item {
  color: gold;
  text-decoration: none;
  padding: 12px 20px;
  font-weight: bold;
  transition: all 0.3s;
  border-left: 3px solid transparent;
}

.menu-item:hover {
  background: #1a1a1a;
  border-left: 3px solid #ffd700;
}

.menu-item.active {
  background: #111;
  border-left: 3px solid gold;
  box-shadow: inset 0 0 10px rgba(255,215,0,0.2);
}

/* CONTAINER */
.container {
  margin-top: 80px;
  margin-left: 240px;
  padding: 20px;
  display: flex;
  flex-wrap: wrap;
  gap: 25px;
}

.card {
  background: linear-gradient(145deg, #1b1b1b, #111);
  padding: 25px;
  border-radius: 12px;
  border: 2px solid gold;
  box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
  transition: transform 0.3s, box-shadow 0.3s;
  width: 320px;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px #ffd700;
}

.card h3 {
  margin-top: 0;
}

.card p {
  font-size: 28px;
  font-weight: bold;
}

/* TABLE */
#lootTable {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
}

#lootTable th, #lootTable td {
  padding: 10px;
  border-bottom: 1px solid gold;
}

/* LOGIN */
#loginForm {
  max-width: 420px;
  margin: 120px auto;
  background: #111;
  padding: 25px;
  border: 2px solid gold;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

#loginForm input {
  padding: 7px;
  background: #222;
  color: gold;
  border: 1px solid gold;
}

/* POPUP */
.popup {
  position: fixed;
  top: 20px;
  right: 20px;
  background: #222;
  color: gold;
  border: 2px solid gold;
  padding: 10px 20px;
  border-radius: 10px;
  display: none;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div>MADNESS</div>
  <div>
    <a href="index.html">Info</a>
    <a href="#" id="logoutBtn" style="display:none;">Logout</a>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <a href="#" class="menu-item active" data-section="dashboard">📊 Gráficos</a>
  <a href="#" class="menu-item" data-section="loot">🎁 Loot</a>
  <a href="#" class="menu-item" data-section="players">👥 Players Guild</a>
  <a href="#" class="menu-item" data-section="bank">🏦 Guild Bank / BOE</a>
</div>

<!-- LOGIN -->
<div id="loginForm">
  <h3>Login Admin</h3>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Senha">
  <button id="loginBtn">Login</button>
</div>

<!-- ADMIN -->
<div id="adminContent" style="display:none;">

  <!-- DASHBOARD -->
  <div class="container" id="dashboard">
    <div class="card"><h3>Total Posts</h3><p id="totalPosts">0</p></div>
    <div class="card"><h3>Total Loot</h3><p id="totalLoot">0</p></div>
    <div class="card"><h3>Raids</h3><p id="raidsCompleted">0</p></div>
  </div>

  <!-- CHARTS -->
  <div class="container" id="charts">
    <canvas id="raidChart"></canvas>
  </div>

  <!-- LOOT -->
  <div class="container" id="lootSection" style="display:none;">
    <div class="card" style="width:100%;">
      <h3>Gerenciar Loot</h3>

      <input type="text" id="lootPlayer" placeholder="Player">
      <input type="text" id="lootItem" placeholder="Item">
      <input type="text" id="lootType" placeholder="Tipo">
      <input type="date" id="lootDate">
      <button id="addLootBtn">Adicionar</button>

      <table id="lootTable">
        <thead>
          <tr>
            <th>Player</th><th>Item</th><th>Tipo</th><th>Data</th><th></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

</div>

<div class="popup" id="popupMsg"></div>

<script type="module">
import { firebaseConfig } from "./config.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* MENU */
const menuItems = document.querySelectorAll(".menu-item");

menuItems.forEach(item => {
  item.onclick = () => {
    menuItems.forEach(i => i.classList.remove("active"));
    item.classList.add("active");

    document.getElementById("dashboard").style.display="none";
    document.getElementById("charts").style.display="none";
    document.getElementById("lootSection").style.display="none";

    if(item.dataset.section==="dashboard"){
      document.getElementById("dashboard").style.display="flex";
      document.getElementById("charts").style.display="flex";
    }

    if(item.dataset.section==="loot"){
      document.getElementById("lootSection").style.display="flex";
    }

    if(item.dataset.section==="players"){
      alert("Players em breve");
    }

    if(item.dataset.section==="bank"){
      alert("Guild Bank em breve");
    }
  };
});

/* LOGIN */
document.getElementById("loginBtn").onclick = ()=>{
  signInWithEmailAndPassword(auth,
    document.getElementById("email").value,
    document.getElementById("password").value
  ).then(()=>{
    document.getElementById("loginForm").style.display="none";
    document.getElementById("adminContent").style.display="block";
  });
};

/* LOOT */
async function loadLoot(){
  const tbody=document.querySelector("#lootTable tbody");
  tbody.innerHTML="";
  const snap=await getDocs(collection(db,"loot"));

  snap.forEach(d=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td>${d.data().player}</td>
      <td>${d.data().item}</td>
      <td>${d.data().type}</td>
      <td>${d.data().date}</td>
      <td><button data-id="${d.id}">X</button></td>
    `;
    tr.querySelector("button").onclick=async()=>{
      await deleteDoc(doc(db,"loot",d.id));
      loadLoot();
    };
    tbody.appendChild(tr);
  });
}

document.getElementById("addLootBtn").onclick=async()=>{
  await addDoc(collection(db,"loot"),{
    player:lootPlayer.value,
    item:lootItem.value,
    type:lootType.value,
    date:lootDate.value
  });
  loadLoot();
};

onAuthStateChanged(auth,(user)=>{
  if(user){
    document.getElementById("loginForm").style.display="none";
    document.getElementById("adminContent").style.display="block";
    loadLoot();
  }
});
</script>

</body>
</html>
