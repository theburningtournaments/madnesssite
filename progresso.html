<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Progresso - Madness</title>
<link rel="stylesheet" href="style.css">
<style>
body{
  background: linear-gradient(to bottom, #0a0a0a, #111);
  color: gold;
  font-family: "Friz Quadrata", Arial, sans-serif;
  margin:0;
  padding:0;
}
.navbar{
  position:fixed;
  top:0;
  width:100%;
  background:#111;
  color: gold;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom: 3px solid gold;
  z-index:1000;
}
.navbar .links a{
  color:gold;
  margin-left:15px;
  text-decoration:none;
  font-weight:bold;
  transition:0.3s;
}
.navbar .links a:hover{
  color:#ffd700;
  text-shadow: 0 0 5px #ffd700;
}
.container{
  margin-top:70px;
  padding:20px;
}
.card{
  background: linear-gradient(145deg,#1b1b1b,#111);
  padding:20px;
  margin-bottom:20px;
  border-radius:10px;
  border:2px solid gold;
  box-shadow: 0 0 15px rgba(255,215,0,0.2);
}
.boss{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:8px 0;
  padding:5px;
  border-bottom:1px solid #333;
}
.boss img{
  width:40px;
  height:40px;
  border:1px solid gold;
  border-radius:5px;
  margin-right:10px;
  transition:0.3s;
}
.boss:hover img{
  transform: scale(1.1);
  box-shadow:0 0 10px #ffd700;
}
.progress-container{
  background:#222;
  border-radius:5px;
  height:20px;
  margin-top:10px;
}
.progress-bar{
  height:100%;
  background: linear-gradient(to right,#ffd700,#ffdd55);
  border-radius:5px;
  transition: width 0.5s ease-in-out;
}
button,input{
  margin-left:5px;
  padding:4px 8px;
  border-radius:5px;
  background:#111;
  color:gold;
  border:1px solid gold;
  cursor:pointer;
  transition:0.3s;
}
button:hover{
  background:#222;
  box-shadow:0 0 8px #ffd700;
}
.raid-buttons button{
  margin:3px;
}
</style>
</head>
<body>

<div class="navbar">
  <div class="logo">MADNESS</div>
  <div class="links">
    <a href="index.html">Informações</a>
    <a href="progresso.html">Progresso</a>
    <a href="loot.html">Loot</a>
    <a href="admin.html">Admin</a>
  </div>
</div>

<div class="container">
  <div class="raid-buttons card" id="raidButtons"></div>
  <div id="raidInfo"></div>
</div>

<script type="module">
import { firebaseConfig } from "./config.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const isAdmin = localStorage.getItem("admin") === "true";

const raids=[
  { id:"dreamrift", name:"The Dreamrift", bosses:[{id:"chimaerus",name:"Chimaerus",icon:"https://wow.zamimg.com/images/wow/icons/large/inv_misc_monsterhead_04.jpg"}]},
  { id:"voidspire", name:"The Voidspire", bosses:[
    {id:"averzian",name:"Averzian",icon:"https://wow.zamimg.com/images/wow/icons/large/inv_120_raid_voidspire_hostgeneral.jpg"},
    {id:"vorasius",name:"Vorasius",icon:"https://wow.zamimg.com/images/wow/icons/large/inv_boss_vorasius.jpg"},
    {id:"fallenking",name:"Fallen King",icon:"https://wow.zamimg.com/images/wow/icons/large/inv_boss_fallenking.jpg"},
    {id:"vaelgor",name:"Vaelgor & Ezzorak",icon:"https://wow.zamimg.com/images/wow/icons/large/inv_boss_vaelgor.jpg"},
    {id:"vanguard",name:"Lightblinded Vanguard",icon:"https://wow.zamimg.com/images/wow/icons/large/inv_boss_vanguard.jpg"},
    {id:"cosmo",name:"Crown of the Cosmos",icon:"https://wow.zamimg.com/images/wow/icons/large/inv_boss_cosmo.jpg"}
  ]},
  { id:"quelthanas", name:"March on Quel'Danas", bosses:[
    {id:"beloren",name:"Belo'ren, Child of Al'ar",icon:"https://wow.zamimg.com/images/wow/icons/large/inv_boss_beloren.jpg"},
    {id:"midnight",name:"Midnight Falls",icon:"https://wow.zamimg.com/images/wow/icons/large/inv_boss_midnightfalls.jpg"}
  ]}
];

const raidButtonsDiv = document.getElementById("raidButtons");
raids.forEach((raid, idx)=>{
  const btn = document.createElement("button");
  btn.innerText = raid.name;
  btn.onclick = ()=>loadRaid(idx);
  raidButtonsDiv.appendChild(btn);
});

async function loadRaid(idx){
  const raid = raids[idx];
  let html = `<div class="card"><h2>${raid.name}</h2>`;
  let totalPulls = 0;
  let killedCount = 0;

  for(const boss of raid.bosses){
    const ref = doc(db,"progress",raid.id+"_"+boss.id);
    const snap = await getDoc(ref);
    const data = snap.exists()?snap.data():{ pulls:0, dead:false };
    const pulls = Number(data.pulls) || 0;
    totalPulls += pulls;
    if(data.dead) killedCount++;

    html += `<div class="boss">
      <span><img src="${boss.icon}" width="40" height="40"> ${boss.name}</span>
      <span>
        ${isAdmin?`<input type="number" value="${pulls}" onchange="updatePulls('${raid.id}','${boss.id}',this.value)">`:pulls}
        ${isAdmin?`<button onclick="toggleDead('${raid.id}','${boss.id}',${data.dead})">${data.dead?"☠️":"✔️"}</button>`:(data.dead?"☠️":"✔️")}
      </span>
    </div>`;
  }

  const percent=(killedCount/raid.bosses.length)*100;
  html += `<p>Total Pulls: ${totalPulls}</p>
           <div class="progress-container"><div class="progress-bar" style="width:${percent}%"></div></div></div>`;

  document.getElementById("raidInfo").innerHTML = html;
}

window.updatePulls=async(raid,boss,val)=>{
  const ref = doc(db,"progress",raid+"_"+boss);
  const snap = await getDoc(ref);
  const data = snap.exists()?snap.data():{ pulls:0, dead:false };
  data.pulls = Number(val) || 0;
  await setDoc(ref,data);
  loadRaid(raids.findIndex(r=>r.id===raid));
}

window.toggleDead=async(raid,boss,current)=>{
  const ref = doc(db,"progress",raid+"_"+boss);
  const snap = await getDoc(ref);
  const data = snap.exists()?snap.data():{ pulls:0, dead:false };
  data.dead = !current;
  await setDoc(ref,data);
  loadRaid(raids.findIndex(r=>r.id===raid));
}
</script>
</body>
</html>
