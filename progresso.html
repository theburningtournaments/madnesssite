<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Progresso</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Madness Guild</h1>
  <a href="index.html">⬅ Voltar</a>
</header>

<h1>Progresso</h1>

<div id="raid"></div>

<script type="module">
import { firebaseConfig } from "./config.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const snap = await getDocs(collection(db,"raids"));

snap.forEach(doc=>{
  const r = doc.data();

  let totalPulls = 0;
  let killed = 0;

  let html = `<div class="box"><h2>${r.name}</h2>`;

  r.bosses.forEach(b=>{
    totalPulls += b.pulls;
    if(b.dead) killed++;

    html += `<p>${b.name} | Pulls: ${b.pulls} | ${b.dead ? "Dead" : "Alive"}</p>`;
  });

  let percent = (killed / r.bosses.length) * 100;

  html += `
    <p>Total Pulls: ${totalPulls}</p>
    <div style="background:#333;height:20px;">
      <div style="background:green;width:${percent}%;height:20px;"></div>
    </div>
  </div>`;

  document.getElementById("raid").innerHTML += html;
});
</script>

</body>
</html>
