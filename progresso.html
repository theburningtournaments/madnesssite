<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Progresso</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <div class="logo">MADNESS</div>
  <div class="links">
    <a href="index.html">Informações</a>
    <a href="progresso.html">Progresso</a>
    <a href="loot.html">Loot</a>
    <a href="admin.html">Admin</a>
  </div>
</div>

<div class="container">

<div id="raidButtons"></div>
<div id="raidInfo"></div>

</div>

<script type="module">
import { firebaseConfig } from "./config.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const isAdmin = localStorage.getItem("admin") === "true";

const raids = [
{
  id: "dreamrift",
  name: "The Dreamrift",
  bosses: [{ id: "chimaerus", name: "Chimaerus" }]
},
{
  id: "voidspire",
  name: "The Voidspire",
  bosses: [
    { id: "averzian", name: "Averzian" },
    { id: "vorasius", name: "Vorasius" },
    { id: "fallenking", name: "Fallen King" },
    { id: "vaelgor", name: "Vaelgor & Ezzorak" },
    { id: "vanguard", name: "Lightblinded Vanguard" },
    { id: "cosmo", name: "Crown of the Cosmos" }
  ]
},
{
  id: "quelthanas",
  name: "March on Quel'Danas",
  bosses: [
    { id: "beloren", name: "Belo'ren, Child of Al'ar" },
    { id: "midnight", name: "Midnight Falls" }
  ]
}
];

raids.forEach((r,i)=>{
  raidButtons.innerHTML += `<button onclick="loadRaid(${i})">${r.name}</button>`;
});

window.loadRaid = async function(index){
  const r = raids[index];

  let html = `<div class="card"><h2>${r.name}</h2>`;

  let total = 0;
  let killed = 0;

  for (let b of r.bosses){
    const ref = doc(db,"progress", r.id+"_"+b.id);
    const snap = await getDoc(ref);

    let data = snap.exists() ? snap.data() : { pulls:0, dead:false };

    total += data.pulls;
    if(data.dead) killed++;

    html += `
    <div class="boss">
      <span>${b.name}</span>
      <span>
        ${isAdmin
          ? `<input type="number" value="${data.pulls}" onchange="updatePulls('${r.id}','${b.id}',this.value)">`
          : data.pulls
        }

        ${isAdmin
          ? `<button onclick="toggleDead('${r.id}','${b.id}',${data.dead})">${data.dead?"Dead":"Alive"}</button>`
          : (data.dead ? "✔" : "❌")
        }
      </span>
    </div>
    `;
  }

  let percent = (killed / r.bosses.length) * 100;

  html += `
    <p>Total Pulls: ${total}</p>
    <div class="progress-container">
      <div class="progress-bar" style="width:${percent}%"></div>
    </div>
  </div>
  `;

  raidInfo.innerHTML = html;
}

window.updatePulls = async (raid,boss,val)=>{
  await setDoc(doc(db,"progress", raid+"_"+boss),{
    pulls:Number(val)
  },{merge:true});

  loadRaid(0);
}

window.toggleDead = async (raid,boss,current)=>{
  await setDoc(doc(db,"progress", raid+"_"+boss),{
    dead:!current
  },{merge:true});

  loadRaid(0);
}

loadRaid(0);
</script>

</body>
</html>
