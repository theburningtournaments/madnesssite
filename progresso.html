<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Progresso - Madness</title>
<link rel="stylesheet" href="style.css">
<style>
body{background:#0b0b0b;color:gold;font-family:Arial,sans-serif;margin:0;padding:0;}
.navbar{position:fixed;top:0;width:100%;background:#111;color:gold;padding:10px;display:flex;justify-content:space-between;align-items:center;z-index:1000;}
.navbar .links a{color:gold;margin-left:15px;text-decoration:none;font-weight:bold;}
.container{margin-top:70px;padding:20px;}
.card{background:#1c1c1c;padding:15px;margin-bottom:20px;border-radius:8px;border:1px solid gold;}
.boss{display:flex;justify-content:space-between;align-items:center;margin:5px 0;}
.progress-container{background:#222;border-radius:5px;height:20px;margin-top:10px;}
.progress-bar{height:100%;background:gold;border-radius:5px;}
button,input{margin-left:5px;padding:3px;border-radius:5px;background:#111;color:gold;border:1px solid gold;}
</style>
</head>
<body>

<div class="navbar">
  <div class="logo">MADNESS</div>
  <div class="links">
    <a href="index.html">Informações</a>
    <a href="progresso.html">Progresso</a>
    <a href="loot.html">Loot</a>
    <a href="admin.html">Admin</a>
  </div>
</div>

<div class="container">
  <div id="raidInfo"></div>
</div>

<script type="module">
import { firebaseConfig } from "./config.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const isAdmin = localStorage.getItem("admin") === "true";

const raids=[
  { id:"dreamrift", name:"The Dreamrift", bosses:[{id:"chimaerus",name:"Chimaerus",icon:"https://wow.zamimg.com/images/wow/icons/large/inv_boss_chimaerus.jpg"}]},
  { id:"voidspire", name:"The Voidspire", bosses:[
    {id:"averzian",name:"Averzian",icon:"https://wow.zamimg.com/images/wow/icons/large/inv_boss_averzian.jpg"},
    {id:"vorasius",name:"Vorasius",icon:"https://wow.zamimg.com/images/wow/icons/large/inv_boss_vorasius.jpg"},
    {id:"fallenking",name:"Fallen King",icon:"https://wow.zamimg.com/images/wow/icons/large/inv_boss_fallenking.jpg"},
    {id:"vaelgor",name:"Vaelgor & Ezzorak",icon:"https://wow.zamimg.com/images/wow/icons/large/inv_boss_vaelgor.jpg"},
    {id:"vanguard",name:"Lightblinded Vanguard",icon:"https://wow.zamimg.com/images/wow/icons/large/inv_boss_vanguard.jpg"},
    {id:"cosmo",name:"Crown of the Cosmos",icon:"https://wow.zamimg.com/images/wow/icons/large/inv_boss_cosmo.jpg"}
  ]},
  { id:"quelthanas", name:"March on Quel'Danas", bosses:[
    {id:"beloren",name:"Belo'ren, Child of Al'ar",icon:"https://wow.zamimg.com/images/wow/icons/large/inv_boss_beloren.jpg"},
    {id:"midnight",name:"Midnight Falls",icon:"https://wow.zamimg.com/images/wow/icons/large/inv_boss_midnightfalls.jpg"}
  ]}
];

async function loadProgress(){
  let html="";
  for(const raid of raids){
    html+=`<div class="card"><h2>${raid.name}</h2>`;
    let totalPulls=0;
    let killedCount=0;

    for(const boss of raid.bosses){
      const ref=doc(db,"progress",raid.id+"_"+boss.id);
      const snap=await getDoc(ref);
      const data=snap.exists()?snap.data():{ pulls:0, dead:false };
      totalPulls+=data.pulls;
      if(data.dead) killedCount++;

      html+=`<div class="boss">
        <span><img src="${boss.icon}" width="32" height="32"> ${boss.name}</span>
        <span>
          ${isAdmin?`<input type="number" value="${data.pulls}" onchange="updatePulls('${raid.id}','${boss.id}',this.value)">`:data.pulls}
          ${isAdmin?`<button onclick="toggleDead('${raid.id}','${boss.id}',${data.dead})">${data.dead?"Dead":"Alive"}</button>`:(data.dead?"✔":"❌")}
        </span>
      </div>`;
    }

    const percent=(killedCount/raid.bosses.length)*100;
    html+=`<p>Total Pulls: ${totalPulls}</p>
           <div class="progress-container"><div class="progress-bar" style="width:${percent}%"></div></div></div>`;
  }
  document.getElementById("raidInfo").innerHTML=html;
}

window.updatePulls=async(raid,boss,val)=>{
  const ref=doc(db,"progress",raid+"_"+boss);
  const snap=await getDoc(ref);
  const data=snap.exists()?snap.data():{ pulls:0, dead:false };
  data.pulls=Number(val);
  await setDoc(ref,data);
  loadProgress();
}

window.toggleDead=async(raid,boss,current)=>{
  const ref=doc(db,"progress",raid+"_"+boss);
  const snap=await getDoc(ref);
  const data=snap.exists()?snap.data():{ pulls:0, dead:false };
  data.dead=!current;
  await setDoc(ref,data);
  loadProgress();
}

loadProgress();
</script>

</body>
</html>
