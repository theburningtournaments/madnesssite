<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Guild Madness - Support</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Guild Madness - Support</h1>
  <div id="loginForm">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="logout()">Logout</button>
  </div>
</header>

<section>
  <h2>Envie um Ticket ou Ideia</h2>
  <div class="admin">
    <textarea id="ticketText" placeholder="Digite seu ticket"></textarea>
    <button onclick="sendTicket()">Enviar Ticket</button>
  </div>
  <div id="ticketsList"></div>
</section>

<script type="module" src="firebase.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
