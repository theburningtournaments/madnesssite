<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="nav">...</div>

<div class="container">
  <h1>Suporte</h1>

  <div class="card">
    <input id="titulo" placeholder="Título">
    <textarea id="msg"></textarea>
    <button id="send">Enviar Ticket</button>
  </div>

  <div id="tickets"></div>
</div>

<script type="module">
import { db } from "./firebase.js";
import { collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

send.onclick = async () => {
  await addDoc(collection(db, "tickets"), {
    titulo: titulo.value,
    msg: msg.value,
    status: "open",
    date: new Date()
  });
  location.reload();
};

async function load() {
  const snap = await getDocs(collection(db, "tickets"));
  snap.forEach(doc => {
    const t = doc.data();
    tickets.innerHTML += `
      <div class="card">
        <b>${t.titulo}</b><br>
        ${t.msg}<br>
        Status: ${t.status}
      </div>
    `;
  });
}

load();
</script>

</body>
</html>
