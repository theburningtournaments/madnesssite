<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="nav">...</div>

<div class="container">
  <h1>Progressão</h1>

  <div id="admin"></div>
  <div id="raids"></div>
</div>

<script type="module">
import { db } from "./firebase.js";
import { collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { isAdmin } from "./auth.js";

const raidsDiv = document.getElementById("raids");

if (isAdmin()) {
  document.getElementById("admin").innerHTML = `
    <div class="card">
      <input id="boss" placeholder="Boss">
      <input id="pulls" placeholder="Pulls">
      <select id="dead">
        <option value="false">Alive</option>
        <option value="true">Dead</option>
      </select>
      <button id="add">Adicionar</button>
    </div>
  `;

  add.onclick = async () => {
    await addDoc(collection(db, "raids"), {
      boss: boss.value,
      pulls: Number(pulls.value),
      dead: dead.value === "true"
    });
    location.reload();
  };
}

async function load() {
  const snap = await getDocs(collection(db, "raids"));

  let totalPulls = 0;
  let mortos = 0;

  snap.forEach(doc => {
    const r = doc.data();
    totalPulls += r.pulls;
    if (r.dead) mortos++;

    raidsDiv.innerHTML += `
      <div class="card">
        ${r.boss} - ${r.pulls} pulls - ${r.dead ? "✔ Dead" : "❌ Alive"}
      </div>
    `;
  });

  raidsDiv.innerHTML += `
    <div class="card">
      <b>Resumo:</b><br>
      Bosses: ${mortos}<br>
      Total Pulls: ${totalPulls}
    </div>
  `;
}

load();
</script>

</body>
</html>
