<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Progresso</title>
</head>
<body style="background:#0b0b0b;color:#c9a44e">

<h1>Progresso Raids</h1>

<select id="difficulty">
  <option value="normal">Normal</option>
  <option value="heroic">Heroic</option>
  <option value="mythic">Mythic</option>
</select>

<div id="raids"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDKwDmRaPgLUa2jB4MTq_OPAyehPnnVPO8",
  authDomain: "madness-fe0a8.firebaseapp.com",
  projectId: "madness-fe0a8",
  storageBucket: "madness-fe0a8.firebasestorage.app",
  messagingSenderId: "1043654768710",
  appId: "1:1043654768710:web:91bf3c5d33aa6eac643247",
  measurementId: "G-G0M19FBPZC"
};

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const snapshot = await getDocs(collection(db, "raids"));

  snapshot.forEach(doc => {
    const raid = doc.data();

    document.getElementById("raids").innerHTML += `
      <h2>${raid.name}</h2>
    `;
  });
</script>

</body>
</html>
