<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Guild Madness - Progress</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Guild Madness - Progress</h1>
  <div id="loginForm">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button id="loginBtn">Login</button>
    <button id="logoutBtn">Logout</button>
  </div>
</header>

<section>
  <h2>Progress da Raid</h2>
  <div class="admin">
    <select id="raidSelect" onchange="loadProgress()">
      <option value="">Escolhe Raid</option>
      <option value="Raid1">Raid 1</option>
      <option value="Raid2">Raid 2</option>
    </select>
    <input type="text" id="bossName" placeholder="Boss">
    <input type="number" id="pulls" placeholder="Pulls">
    <label>Mortos? <input type="checkbox" id="killed"></label>
    <button id="addProgressBtn">Adicionar Progress</button>
  </div>
  <div id="progressList"></div>
  <div id="progressSummary" class="card"></div>
</section>

<script type="module" src="firebase.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
