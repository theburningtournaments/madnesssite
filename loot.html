<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Guild Madness - Loot Log</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Guild Madness - Loot Log</h1>
  <div id="loginForm">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="logout()">Logout</button>
  </div>
</header>

<section>
  <h2>Loot Log</h2>
  <div class="admin">
    <input type="date" id="lootDate">
    <input type="text" id="player" placeholder="Player">
    <input type="text" id="lootItem" placeholder="Loot">
    <button onclick="addLoot()">Adicionar Loot</button>
  </div>
  <div id="lootList"></div>
</section>

<script type="module" src="firebase.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
