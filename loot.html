<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Loot</title>
</head>
<body style="background:#0b0b0b;color:#c9a44e">

<h1>Loot</h1>

<input id="search" placeholder="Pesquisar..." onkeyup="searchLoot()">

<table border="1" id="lootTable">
  <tr>
    <th>Player</th>
    <th>Data</th>
    <th>Item</th>
    <th>Tipo</th>
  </tr>
</table>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDKwDmRaPgLUa2jB4MTq_OPAyehPnnVPO8",
  authDomain: "madness-fe0a8.firebaseapp.com",
  projectId: "madness-fe0a8",
  storageBucket: "madness-fe0a8.firebasestorage.app",
  messagingSenderId: "1043654768710",
  appId: "1:1043654768710:web:91bf3c5d33aa6eac643247",
  measurementId: "G-G0M19FBPZC"
};

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let lootData = [];

  const snapshot = await getDocs(collection(db, "loot"));
  snapshot.forEach(doc => {
    const data = doc.data();
    lootData.push(data);

    document.getElementById("lootTable").innerHTML += `
      <tr>
        <td>${data.player}</td>
        <td>${data.date}</td>
        <td>${data.item}</td>
        <td>${data.type}</td>
      </tr>
    `;
  });

  window.searchLoot = function () {
    const value = document.getElementById("search").value.toLowerCase();

    document.getElementById("lootTable").innerHTML = `
      <tr>
        <th>Player</th>
        <th>Data</th>
        <th>Item</th>
        <th>Tipo</th>
      </tr>
    `;

    lootData
      .filter(l => 
        l.player.toLowerCase().includes(value) ||
        l.item.toLowerCase().includes(value) ||
        l.date.includes(value)
      )
      .forEach(l => {
        document.getElementById("lootTable").innerHTML += `
          <tr>
            <td>${l.player}</td>
            <td>${l.date}</td>
            <td>${l.item}</td>
            <td>${l.type}</td>
          </tr>
        `;
      });
  }
</script>

</body>
</html>
